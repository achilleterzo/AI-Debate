name: Build Desktop App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Decides whether this run should produce a release, and for which tag.
  # - A direct push of a `v*` tag always releases that tag.
  # - A push to main only releases if there is at least one `fix:`/`feat:`
  #   commit since the last tag; in that case it bumps package.json,
  #   commits it as `chore(release): vX.Y.Z`, and tags it.
  version:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.decide.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release tag
        id: decide
        run: |
          set -euo pipefail

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "release_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git log -1 --pretty=%s | grep -q '^chore(release):'; then
            echo "HEAD is already a release commit, nothing to do."
            echo "release_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          range="${last_tag:+refs/tags/$last_tag..}HEAD"
          subjects=$(git log "$range" --format=%s)
          bodies=$(git log "$range" --format=%B)

          bump=""
          if echo "$subjects" | grep -qE '^[a-zA-Z]+(\([^)]*\))?!:' || echo "$bodies" | grep -q 'BREAKING CHANGE'; then
            bump="major"
          elif echo "$subjects" | grep -qE '^feat(\([^)]*\))?:'; then
            bump="minor"
          elif echo "$subjects" | grep -qE '^fix(\([^)]*\))?:'; then
            bump="patch"
          fi

          if [ -z "$bump" ]; then
            echo "No fix/feat commits since ${last_tag:-the beginning}, skipping release."
            echo "release_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          npm version "$bump" --no-git-tag-version --no-commit-hooks >/dev/null
          new_version="v$(node -p "require('./package.json').version")"

          if git rev-parse "refs/tags/$new_version" >/dev/null 2>&1; then
            echo "Tag $new_version already exists, aborting to avoid overwriting it." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): $new_version"
          git tag "$new_version"
          git push origin HEAD:main
          git push origin "$new_version"

          echo "release_tag=$new_version" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    if: needs.version.outputs.release_tag != ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: ai-debate-windows
            build_args: --win nsis
            artifact_path: release/*Setup*.exe
          - os: ubuntu-latest
            artifact_name: ai-debate-linux
            build_args: --linux AppImage
            artifact_path: release/*.AppImage
          - os: macos-latest
            artifact_name: ai-debate-macos
            build_args: --mac dmg
            artifact_path: release/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.release_tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build desktop package
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:desktop:ci -- ${{ matrix.build_args }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.release_tag }}
          files: ${{ matrix.artifact_path }}
